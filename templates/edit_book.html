{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Edit Book: {{ book.title }}</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" value="{{ book.title }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Author</label>
            <input type="text" name="author" class="form-control" value="{{ book.author }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Category</label>
            <input type="text" name="category" class="form-control" value="{{ book.category }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Total Copies</label>
            <input type="number" name="total_copies" class="form-control" value="{{ book.total_copies }}" min="1" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Available Copies</label>
            <input type="number" name="available_copies" class="form-control" value="{{ book.available_copies }}" min="0" required>
        </div>
        <button type="submit" class="btn btn-primary">Update Book</button>
        <a href="{{ url_for('view_books') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
